<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMA API Docs</title>
    <link rel="icon" href="/public/assets/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/public/styles.css">
    <script>
        (() => {
            const isLocal = ["localhost", "127.0.0.1", "0.0.0.0"].includes(window.location.hostname);
            const apiBase = window.QMA_API_BASE_URL || (isLocal ? "" : "https://qma-api.onrender.com");
            const target = `${String(apiBase).replace(/\/$/, "")}/docs`;
            if (target !== "/docs") window.location.replace(target);
        })();
    </script>
</head>

<body class="landing-body">
    <main class="landing-shell" style="min-height: 100vh; display: grid; place-items: center;">
        <section class="landing-source" style="max-width: 560px;">
            <div class="section-eyebrow landing-section-label">API Docs</div>
            <h1 style="font-size: clamp(2rem, 6vw, 4rem); line-height: 1;">Opening QMA API</h1>
            <p>If you are not redirected automatically, open the hosted API documentation.</p>
            <div class="landing-api-actions" style="display: flex; gap: 8px;">
                <a href="https://qma-api.onrender.com/docs" style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; flex: 1;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Open API Docs
                </a>
                <a href="/" style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; flex: 1;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to QMA
                </a>
            </div>
        </section>
    </main>
</body>

</html>
