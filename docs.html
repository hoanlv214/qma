<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMA API Docs</title>
    <link rel="icon" href="/public/assets/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/public/styles.css">
    <script>
        (() => {
            const isLocal = ["localhost", "127.0.0.1", "0.0.0.0"].includes(window.location.hostname);
            const apiBase = window.QMA_API_BASE_URL || (isLocal ? "" : "https://qma-api.onrender.com");
            const target = `${String(apiBase).replace(/\/$/, "")}/docs`;
            if (target !== "/docs") window.location.replace(target);
        })();
    </script>
</head>

<body class="landing-body">
    <main class="landing-shell" style="min-height: 100vh; display: grid; place-items: center;">
        <section class="landing-source" style="max-width: 560px;">
            <div class="landing-section-label">API Docs</div>
            <h1 style="font-size: clamp(2rem, 6vw, 4rem); line-height: 1;">Opening QMA API</h1>
            <p>If you are not redirected automatically, open the hosted API documentation.</p>
            <div class="landing-api-actions">
                <a href="https://qma-api.onrender.com/docs">Open API Docs</a>
                <a href="/">Back to QMA</a>
            </div>
        </section>
    </main>
</body>

</html>
