services:
  - type: web
    name: qma-api-rebuild
    env: python
    plan: free
    region: singapore
    branch: frontend/vite-react-rebuild
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: QMA_ARC_GATEWAY_URL
        value: https://qma-arc-gateway-rebuild.onrender.com
      - key: QMA_ARC_SELLER_ADDRESS
        sync: false
      - key: QMA_FUNDING_MEMORY_OWNER_WALLET
        sync: false
      - key: QMA_OI_MEMORY_OWNER_WALLET
        sync: false
      - key: QMA_ADMIN_WALLET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SCHEMA
        value: public
      - key: QMA_ACCESS_TOKEN_SECRET
        generateValue: true
      - key: QMA_ADMIN_TOKEN
        sync: false

  - type: web
    name: qma-arc-gateway-rebuild
    env: node
    plan: free
    region: singapore
    branch: frontend/vite-react-rebuild
    rootDir: arc_gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: QMA_BACKEND_INTERNAL_URL
        value: https://qma-api-rebuild.onrender.com
      - key: QMA_ARC_SELLER_ADDRESS
        sync: false
